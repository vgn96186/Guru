commands:
  install: npm install
  typecheck: npm run typecheck
  build: npm run android:apk:device
  test: npm run test:unit
  lint: npm run lint
  format: npm run format:check:scoped
  verify: npm run verify:ci
  verify:strict: npm run verify:strict
  drizzle:generate: npx drizzle-kit generate
  test:parity: npm run test:unit -- --testPathPattern=drizzleSchemaParity

services:
  metro:
    start: PORT=8081 npm start
    stop: lsof -ti :8081 | xargs kill
    healthcheck: curl -sf http://localhost:8081 > /dev/null
    port: 8081
    depends_on: []

  dev-server:
    start: PORT=3100 node scripts/launcher/server.js
    stop: lsof -ti :3100 | xargs kill
    healthcheck: curl -sf http://localhost:3100/health > /dev/null
    port: 3100
    depends_on: []

  # Note: No database service - SQLite is file-based, not a running service
  # Note: Test database is in-memory via better-sqlite3 in tests
