name: Build Release APK

on:
  push:
    branches: [main, debug]
    paths-ignore:
      - '**/*.md'
      - '**/*.test.*'
      - '__mocks__/**'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias guru \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Guru,OU=Dev,O=Guru,L=City,S=State,C=IN" \
            -storepass gururelease \
            -keypass gururelease

      - name: Configure release signing
        run: |
          cat >> android/gradle.properties << 'EOF'
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=guru
          MYAPP_RELEASE_STORE_PASSWORD=gururelease
          MYAPP_RELEASE_KEY_PASSWORD=gururelease
          EOF

      - name: Patch build.gradle for release signing
        run: |
          python3 - << 'PYEOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing_config = """
              release {
                  storeFile file(MYAPP_RELEASE_STORE_FILE)
                  storePassword MYAPP_RELEASE_STORE_PASSWORD
                  keyAlias MYAPP_RELEASE_KEY_ALIAS
                  keyPassword MYAPP_RELEASE_KEY_PASSWORD
              }
          """

          # Insert release signing config after debug block inside signingConfigs
          content = re.sub(
              r'(signingConfigs\s*\{[^}]*debug\s*\{[^}]*\})',
              r'\1' + signing_config,
              content,
              count=1
          )

          # Wire release build type to use release signing config
          content = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release',
              content,
              count=1
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          PYEOF

      - name: Bundle JS and build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon -x lint

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: guru-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
