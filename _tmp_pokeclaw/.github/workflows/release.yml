name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Prepare release signing
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for var in ANDROID_KEYSTORE_B64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required Actions secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Refusing to publish a public APK without a stable signing key."
            exit 1
          fi

          KEYSTORE_PATH="$RUNNER_TEMP/pokeclaw-release.keystore"
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > "$KEYSTORE_PATH"

          cat > local.properties <<EOF
          KEYSTORE_FILE=$KEYSTORE_PATH
          KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD
          KEY_ALIAS=$ANDROID_KEY_ALIAS
          KEY_PASSWORD=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build signed release APK
        run: ./gradlew assembleRelease

      - name: Generate release checksums
        run: sha256sum app/build/outputs/apk/release/*.apk > app/build/outputs/apk/release/SHA256SUMS.txt

      - name: Extract release notes from README
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          python <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"].removeprefix("v")
          text = Path("README.md").read_text()
          header = re.compile(rf"^### v{re.escape(version)}\b.*$", re.MULTILINE)
          match = header.search(text)
          if not match:
              raise SystemExit(f"Could not find changelog entry for v{version} in README.md")

          rest = text[match.end():]
          next_header = re.search(r"^### v", rest, re.MULTILINE)
          notes = (rest[:next_header.start()] if next_header else rest).strip()
          if not notes:
              raise SystemExit(f"Changelog entry for v{version} is empty")

          Path("release-notes.md").write_text(notes + "\n")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/SHA256SUMS.txt
          body_path: release-notes.md
          draft: false
          prerelease: false
