<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>OG Image Preview — PokeClaw (1200x630)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    .og-frame {
      width: 1200px;
      height: 630px;
      background: #0d1117;
      border: 2px solid #30363d;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* radial gradient glow */
    .og-frame::before {
      content: '';
      position: absolute;
      top: -100px; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 600px;
      background: radial-gradient(ellipse at center, rgba(240,98,46,0.18) 0%, transparent 65%);
      pointer-events: none;
    }
    .og-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px;
    }
    .og-logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }
    .og-logo-row img {
      width: 80px;
      height: 80px;
      border-radius: 16px;
    }
    .og-logo-row span {
      font-size: 52px;
      font-weight: 800;
      color: #e6edf3;
      letter-spacing: -0.02em;
    }
    .og-tagline {
      font-size: 30px;
      color: #8b949e;
      line-height: 1.4;
      margin-bottom: 40px;
    }
    .og-tagline strong {
      color: #f0622e;
    }
    .og-pills {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .og-pill {
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 10px 22px;
      border-radius: 100px;
      font-size: 18px;
    }
    .og-pill.accent {
      border-color: rgba(240,98,46,0.4);
      color: #f0622e;
      background: rgba(240,98,46,0.08);
    }
  </style>
</head>
<body>
  <div class="og-frame">
    <div class="og-inner">
      <div class="og-logo-row">
        <img src="pokeclaw.png" alt="PokeClaw" />
        <span>PokeClaw</span>
      </div>
      <p class="og-tagline">
        <strong>Gemma 4 controls your Android phone.</strong><br>
        No cloud. No API keys. 100% offline.
      </p>
      <div class="og-pills">
        <span class="og-pill accent">Open Source</span>
        <span class="og-pill">21 Tools</span>
        <span class="og-pill">Android 9+</span>
        <span class="og-pill accent">100% Offline</span>
        <span class="og-pill">Free Forever</span>
      </div>
    </div>
  </div>

  <!--
    NOTE: og-image.png needs to be a real PNG screenshot of this page at 1200x630.
    To generate it:
      1. Open this file in Chrome at 1200px width
      2. Screenshot the .og-frame div
      3. Save as og-image.png in the same directory
    OR use a headless screenshot tool:
      npx playwright screenshot --viewport-size="1200,630" og-image.html og-image.png
  -->
</body>
</html>
