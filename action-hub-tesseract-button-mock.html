<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Action Hub — Tesseract Button Mock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #000000;
        --surface: rgba(255, 255, 255, 0.03);
        --surfaceHover: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.08);
        --borderHi: rgba(255, 255, 255, 0.18);
        --text: #f2f2f2;
        --muted: #a0a0a5;
        --muted2: #939396;
        --brand: #5e6ad2;
        --brandHalo: rgba(94, 106, 210, 0.28);
        --pressed: 0.5;
        --disabled: 0.55;
        --s: 1.9;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        color: var(--text);
        background: radial-gradient(980px 520px at 50% 12%, rgba(94, 106, 210, 0.13), transparent 60%),
          radial-gradient(760px 520px at 50% 120%, rgba(255, 255, 255, 0.05), transparent 58%),
          var(--bg);
        overflow: hidden;
      }

      .wrap {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 14px;
        place-items: center;
        padding: 18px 16px 18px;
      }

      .head {
        width: min(760px, 96vw);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .head h1 {
        margin: 0;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.9);
      }

      .head p {
        margin: 6px 0 0;
        color: var(--muted2);
        font-size: 12px;
        line-height: 1.45;
        max-width: 64ch;
      }

      .chips {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: rgba(255, 255, 255, 0.86);
        box-shadow: 0 18px 70px rgba(0, 0, 0, 0.35);
      }

      .chip label {
        font-size: 12px;
        color: var(--muted);
      }

      .chip input[type="range"] {
        width: 160px;
        accent-color: var(--brand);
      }

      .chip kbd {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
      }

      .stage {
        width: min(760px, 96vw);
        height: min(560px, 74vh);
        border-radius: 28px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.01), rgba(0, 0, 0, 0));
        box-shadow: 0 40px 140px rgba(0, 0, 0, 0.72);
        overflow: hidden;
        display: grid;
        place-items: center;
        padding: 22px;
        position: relative;
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: -70px;
        background: radial-gradient(420px 300px at 50% 20%, rgba(94, 106, 210, 0.09), transparent 60%),
          radial-gradient(520px 380px at 50% 120%, rgba(255, 255, 255, 0.04), transparent 62%);
        filter: blur(10px);
        opacity: 1;
      }

      .fabWrap {
        position: relative;
        width: calc(120px * var(--s));
        height: calc(120px * var(--s));
        display: grid;
        place-items: center;
        isolation: isolate;
      }

      .halo {
        position: absolute;
        inset: calc(-56px * var(--s));
        border-radius: 999px;
        background: radial-gradient(160px 160px at 50% 55%, var(--brandHalo), transparent 62%),
          radial-gradient(240px 240px at 50% 55%, rgba(94, 106, 210, 0.12), transparent 72%);
        filter: blur(calc(18px * var(--s)));
        opacity: 0.6;
        pointer-events: none;
        transition: opacity 220ms ease, transform 260ms ease;
        z-index: 0;
      }

      .fabWrap[data-open="true"] .halo {
        opacity: 0.95;
        transform: translateY(calc(-4px * var(--s)));
      }

      .tesseractFab {
        position: relative;
        width: calc(64px * var(--s));
        height: calc(64px * var(--s));
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: calc(20px * var(--s));
        background: radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.18), transparent 56%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0)),
          var(--brand);
        box-shadow: 0 calc(4px * var(--s)) calc(12px * var(--s)) rgba(94, 106, 210, 0.42),
          0 calc(18px * var(--s)) calc(48px * var(--s)) rgba(0, 0, 0, 0.78);
        display: grid;
        place-items: center;
        padding: 0;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transform: rotate(-10deg);
        transition: transform 260ms cubic-bezier(0.2, 0.9, 0.2, 1), opacity 160ms ease, filter 220ms ease,
          box-shadow 220ms ease;
        z-index: 2;
        overflow: hidden;
      }

      .tesseractFab::after {
        content: "";
        position: absolute;
        inset: 2px;
        border-radius: calc(18px * var(--s));
        border: 1px solid rgba(255, 255, 255, 0.14);
        opacity: 0.9;
        pointer-events: none;
      }

      .tesseractFab::before {
        content: "";
        position: absolute;
        inset: -22px;
        opacity: 0.24;
        background: repeating-linear-gradient(
          115deg,
          rgba(255, 255, 255, 0.18) 0 7px,
          rgba(255, 255, 255, 0.04) 7px 17px
        );
        transform: rotate(16deg);
        pointer-events: none;
        mix-blend-mode: overlay;
      }

      .tesseractFab:hover {
        filter: brightness(1.03) saturate(1.02);
        transform: rotate(-10deg) translateY(calc(-1px * var(--s)));
      }

      .tesseractFab:active {
        transform: rotate(-10deg) translateY(calc(2px * var(--s))) scale(0.986);
        opacity: var(--pressed);
      }

      .tesseractFab:focus-visible {
        outline: none;
        box-shadow: 0 0 0 calc(5px * var(--s)) rgba(94, 106, 210, 0.28), 0 0 0 1px rgba(94, 106, 210, 0.5) inset,
          0 calc(4px * var(--s)) calc(12px * var(--s)) rgba(94, 106, 210, 0.42),
          0 calc(18px * var(--s)) calc(48px * var(--s)) rgba(0, 0, 0, 0.78);
      }

      .fabWrap[data-open="true"] .tesseractFab {
        transform: rotate(0deg) translateY(calc(-2px * var(--s)));
      }

      .fabWrap[data-disabled="true"] .tesseractFab {
        cursor: not-allowed;
        opacity: var(--disabled);
        transform: rotate(-10deg);
        filter: saturate(0.9) brightness(0.95);
      }

      .fabWrap[data-disabled="true"] .halo {
        opacity: 0.25;
      }

      .glyph {
        position: relative;
        width: calc(34px * var(--s));
        height: calc(34px * var(--s));
        display: grid;
        place-items: center;
        transform: rotate(10deg);
        transition: transform 260ms cubic-bezier(0.2, 0.9, 0.2, 1), opacity 220ms ease;
        filter: drop-shadow(0 calc(10px * var(--s)) calc(18px * var(--s)) rgba(0, 0, 0, 0.55));
      }

      .fabWrap[data-open="true"] .glyph {
        transform: rotate(10deg) scale(0.98);
      }

      .glyph svg {
        width: 100%;
        height: 100%;
      }

      .closeX {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        opacity: 0;
        transform: rotate(10deg) scale(0.86);
        transition: opacity 180ms ease, transform 240ms cubic-bezier(0.2, 0.9, 0.2, 1);
      }

      .closeX svg {
        width: calc(26px * var(--s));
        height: calc(26px * var(--s));
      }

      .fabWrap[data-open="true"] .closeX {
        opacity: 1;
        transform: rotate(10deg) scale(1);
      }

      .fabWrap[data-open="true"] .glyph {
        opacity: 0;
      }

      .foot {
        width: min(760px, 96vw);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted2);
        font-size: 12px;
        padding: 0 6px;
      }

      .state {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <div>
          <h1>Tesseract Action Hub Button (no circle)</h1>
          <p>Center tab button becomes a tilted “command tile” with a tesseract wireframe glyph. Click to toggle open.</p>
        </div>
        <div class="chips">
          <span class="chip"><kbd>Click</kbd><span>toggle</span></span>
          <span class="chip"><kbd>D</kbd><span>disable</span></span>
          <span class="chip"><kbd>Esc</kbd><span>close</span></span>
          <span class="chip">
            <label for="s">Scale</label>
            <input id="s" type="range" min="1.2" max="2.6" step="0.05" value="1.9" />
            <span id="sv" style="font-size: 12px; color: rgba(255, 255, 255, 0.76)">1.90×</span>
          </span>
        </div>
      </div>

      <div class="stage">
        <div class="fabWrap" id="wrapFab" data-open="false" data-disabled="false">
          <div class="halo" aria-hidden="true"></div>
          <button class="tesseractFab" id="btn" type="button" aria-label="Action hub" aria-pressed="false">
            <span class="glyph" aria-hidden="true">
              <svg viewBox="0 0 64 64" fill="none">
                <path
                  d="M18 20h26v26H18V20Z"
                  stroke="rgba(255,255,255,.92)"
                  stroke-width="3.2"
                  stroke-linejoin="round"
                />
                <path
                  d="M26 14h26v26H26V14Z"
                  stroke="rgba(255,255,255,.62)"
                  stroke-width="3.2"
                  stroke-linejoin="round"
                />
                <path d="M18 20l8-6" stroke="rgba(255,255,255,.62)" stroke-width="3.2" stroke-linecap="round" />
                <path d="M44 20l8-6" stroke="rgba(255,255,255,.62)" stroke-width="3.2" stroke-linecap="round" />
                <path d="M44 46l8-6" stroke="rgba(255,255,255,.62)" stroke-width="3.2" stroke-linecap="round" />
                <path d="M18 46l8-6" stroke="rgba(255,255,255,.62)" stroke-width="3.2" stroke-linecap="round" />
                <circle cx="31" cy="33" r="2.4" fill="rgba(0,0,0,.45)" />
              </svg>
            </span>
            <span class="closeX" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M6 6l12 12M18 6L6 18"
                  stroke="rgba(255,255,255,.92)"
                  stroke-width="2.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
          </button>
        </div>
      </div>

      <div class="foot">
        <span class="state" id="state">State: closed</span>
        <span class="state">Goal: reads “dimensional object” at tab-bar glance, not a generic FAB.</span>
      </div>
    </div>

    <script>
      const root = document.documentElement;
      const wrap = document.getElementById("wrapFab");
      const btn = document.getElementById("btn");
      const state = document.getElementById("state");
      const s = document.getElementById("s");
      const sv = document.getElementById("sv");

      function setOpen(next) {
        if (wrap.dataset.disabled === "true") return;
        wrap.dataset.open = next ? "true" : "false";
        btn.setAttribute("aria-pressed", next ? "true" : "false");
        state.textContent = `State: ${next ? "open" : "closed"}${wrap.dataset.disabled === "true" ? " (disabled)" : ""}`;
      }

      function setDisabled(next) {
        wrap.dataset.disabled = next ? "true" : "false";
        btn.disabled = next;
        if (next) setOpen(false);
        state.textContent = `State: ${wrap.dataset.open === "true" ? "open" : "closed"}${next ? " (disabled)" : ""}`;
      }

      function syncScale() {
        const v = Number(s.value);
        root.style.setProperty("--s", String(v));
        sv.textContent = `${v.toFixed(2)}×`;
      }

      btn.addEventListener("click", () => setOpen(wrap.dataset.open !== "true"));
      s.addEventListener("input", syncScale);
      syncScale();

      document.addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();
        if (k === "escape") setOpen(false);
        if (k === "d") setDisabled(wrap.dataset.disabled !== "true");
      });
    </script>
  </body>
</html>
