<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guru Skills Showcase</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Outfit', sans-serif;
        overflow: hidden;
      }

      /* Animated gradient mesh background */
      body::before {
        content: '';
        position: fixed;
        inset: -50%;
        background: radial-gradient(
            ellipse 600px 400px at 20% 30%,
            rgba(94, 106, 210, 0.15),
            transparent
          ),
          radial-gradient(ellipse 500px 500px at 80% 70%, rgba(217, 119, 6, 0.1), transparent),
          radial-gradient(ellipse 400px 300px at 60% 20%, rgba(63, 185, 80, 0.08), transparent);
        animation: meshShift 12s ease-in-out infinite alternate;
      }

      @keyframes meshShift {
        0% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-30px, 20px) scale(1.05);
        }
        100% {
          transform: translate(20px, -15px) scale(1);
        }
      }

      .card {
        position: relative;
        width: 380px;
        background: rgba(9, 12, 18, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 32px 28px;
        backdrop-filter: blur(40px);
        z-index: 1;
        animation: cardReveal 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        animation-delay: 0.2s;
      }

      @keyframes cardReveal {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .card::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 24px;
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.04) 0%, transparent 50%);
        pointer-events: none;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .streak-badge {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .fire {
        font-size: 22px;
        animation: fireFlicker 1.5s ease-in-out infinite alternate;
      }

      @keyframes fireFlicker {
        0% {
          transform: scale(1) rotate(-3deg);
        }
        100% {
          transform: scale(1.1) rotate(3deg);
        }
      }

      .streak-count {
        font-family: 'Playfair Display', serif;
        font-size: 48px;
        font-weight: 900;
        background: linear-gradient(135deg, #f97316 0%, #fbbf24 50%, #f59e0b 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
      }

      .streak-label {
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.35);
      }

      .week-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        margin-bottom: 24px;
      }

      .day {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      .day-name {
        font-size: 10px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.2);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .day-dot {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        transition: all 0.3s ease;
      }

      .day-dot.completed {
        background: rgba(63, 185, 80, 0.12);
        border-color: rgba(63, 185, 80, 0.4);
        animation: dotPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      .day-dot.today {
        border-color: rgba(249, 115, 22, 0.6);
        background: rgba(249, 115, 22, 0.08);
        box-shadow: 0 0 20px rgba(249, 115, 22, 0.2);
        animation: todayPulse 2s ease-in-out infinite;
      }

      @keyframes dotPop {
        from {
          transform: scale(0.6);
        }
        to {
          transform: scale(1);
        }
      }

      @keyframes todayPulse {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(249, 115, 22, 0.2);
        }
        50% {
          box-shadow: 0 0 28px rgba(249, 115, 22, 0.35);
        }
      }

      .xp-section {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        background: rgba(94, 106, 210, 0.06);
        border: 1px solid rgba(94, 106, 210, 0.12);
        border-radius: 14px;
        margin-bottom: 16px;
      }

      .xp-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .xp-icon {
        font-size: 18px;
      }

      .xp-text {
        font-size: 13px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.7);
      }

      .xp-text span {
        color: #8b93e0;
        font-weight: 800;
      }

      .xp-bar-track {
        width: 80px;
        height: 6px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 3px;
        overflow: hidden;
      }

      .xp-bar-fill {
        height: 100%;
        width: 68%;
        background: linear-gradient(90deg, #5e6ad2, #8b93e0);
        border-radius: 3px;
        animation: barGrow 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        animation-delay: 0.8s;
      }

      @keyframes barGrow {
        from {
          width: 0;
        }
      }

      .motivational-text {
        text-align: center;
        font-size: 12px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.25);
        font-style: italic;
        letter-spacing: 0.3px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div>
          <div class="streak-badge">
            <span class="fire">🔥</span>
            <span class="streak-count">14</span>
          </div>
          <div class="streak-label">Day Streak</div>
        </div>
        <div style="text-align: right">
          <div style="font-size: 20px; margin-bottom: 2px">🧠</div>
          <div
            style="
              font-size: 10px;
              font-weight: 700;
              color: rgba(255, 255, 255, 0.35);
              text-transform: uppercase;
              letter-spacing: 1.5px;
            "
          >
            Lvl 12
          </div>
        </div>
      </div>

      <div class="week-grid">
        <div class="day">
          <span class="day-name">Mon</span><span class="day-dot completed">✓</span>
        </div>
        <div class="day">
          <span class="day-name">Tue</span><span class="day-dot completed">✓</span>
        </div>
        <div class="day">
          <span class="day-name">Wed</span><span class="day-dot completed">✓</span>
        </div>
        <div class="day">
          <span class="day-name">Thu</span><span class="day-dot today">📚</span>
        </div>
        <div class="day"><span class="day-name">Fri</span><span class="day-dot"></span></div>
        <div class="day"><span class="day-name">Sat</span><span class="day-dot"></span></div>
        <div class="day"><span class="day-name">Sun</span><span class="day-dot"></span></div>
      </div>

      <div class="xp-section">
        <div class="xp-left">
          <span class="xp-icon">⚡</span>
          <span class="xp-text"><span>1,340</span> / 2,000 XP</span>
        </div>
        <div class="xp-bar-track"><div class="xp-bar-fill"></div></div>
      </div>

      <div class="motivational-text">"Your future patients are counting on this, Vishnu."</div>
    </div>
  </body>
</html>
