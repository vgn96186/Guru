appId: com.anonymous.gurustudy
---
- launchApp

- extendedWaitUntil:
    visible:
      id: "quick-start-btn"
    timeout: 30000
- tapOn:
    id: "quick-start-btn"

- scrollUntilVisible:
    element:
      id: "tools-library-header"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "tools-library-header"

- scrollUntilVisible:
    element:
      id: "lecture-mode-btn"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "lecture-mode-btn"

- extendedWaitUntil:
    visible:
      id: "auto-scribe-btn"
    timeout: 15000
- tapOn:
    id: "auto-scribe-btn"

- assertNotVisible: "Transcription Required"
