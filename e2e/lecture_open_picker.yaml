appId: com.anonymous.gurustudy
---
- launchApp
- extendedWaitUntil:
    visible:
      id: "quick-start-btn"
    timeout: 30000
- tapOn:
    id: "quick-start-btn"
- scrollUntilVisible:
    element:
      id: "lecture-mode-btn"
    direction: DOWN
    timeout: 30000
- tapOn:
    id: "lecture-mode-btn"
- extendedWaitUntil:
    visible:
      id: "import-transcribe-btn"
    timeout: 15000
- tapOn:
    id: "import-transcribe-btn"
