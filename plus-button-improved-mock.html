<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plus Button Improvement Mock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #000000;
        --surface: rgba(255, 255, 255, 0.03);
        --surfaceHover: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.08);
        --borderHi: rgba(255, 255, 255, 0.18);
        --text: #f2f2f2;
        --muted: #a0a0a5;
        --muted2: #939396;
        --brand: #5e6ad2;
        --brandHalo: rgba(94, 106, 210, 0.32);
        --pressed: 0.5;
        --disabled: 0.55;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        color: var(--text);
        background: radial-gradient(900px 520px at 50% 20%, rgba(94, 106, 210, 0.12), transparent 60%),
          radial-gradient(780px 520px at 50% 120%, rgba(255, 255, 255, 0.05), transparent 55%),
          var(--bg);
        overflow: hidden;
      }

      .wrap {
        height: 100%;
        display: grid;
        grid-template-rows: 1fr auto;
        place-items: center;
        padding: 18px 16px 20px;
        gap: 14px;
      }

      .stage {
        width: min(760px, 92vw);
        height: min(560px, 74vh);
        border-radius: 28px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.01), rgba(0, 0, 0, 0));
        box-shadow: 0 40px 140px rgba(0, 0, 0, 0.7);
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
        padding: 22px;
      }

      .grid {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        align-items: center;
      }

      @media (max-width: 640px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        border-radius: 22px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        padding: 18px 18px 22px;
        display: grid;
        place-items: center;
        gap: 14px;
      }

      .label {
        display: grid;
        gap: 6px;
        text-align: center;
      }

      .label strong {
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.02em;
      }

      .label span {
        font-size: 12px;
        color: var(--muted2);
        line-height: 1.35;
      }

      .fabWrap {
        position: relative;
        width: 120px;
        height: 120px;
        display: grid;
        place-items: center;
      }

      .fabGlow {
        position: absolute;
        inset: -54px;
        border-radius: 999px;
        background: radial-gradient(140px 140px at 50% 55%, var(--brandHalo), transparent 62%),
          radial-gradient(200px 200px at 50% 55%, rgba(94, 106, 210, 0.14), transparent 72%);
        filter: blur(18px);
        opacity: 0.55;
        pointer-events: none;
        transition: opacity 220ms ease, transform 260ms ease;
      }

      .fabWrap[data-open="true"] .fabGlow {
        opacity: 0.9;
        transform: translateY(-4px);
      }

      .fab {
        width: 52px;
        height: 52px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: var(--brand);
        box-shadow: 0 4px 12px rgba(94, 106, 210, 0.4), 0 18px 46px rgba(0, 0, 0, 0.76);
        display: grid;
        place-items: center;
        padding: 0;
        cursor: pointer;
        transition: transform 160ms ease, opacity 160ms ease, filter 220ms ease;
        -webkit-tap-highlight-color: transparent;
      }

      .fab:active {
        transform: translateY(2px) scale(0.986);
        opacity: var(--pressed);
      }

      .fab:focus-visible {
        outline: none;
        box-shadow: 0 0 0 5px rgba(94, 106, 210, 0.28), 0 0 0 1px rgba(94, 106, 210, 0.5) inset, 0 4px 12px rgba(94, 106, 210, 0.4),
          0 18px 46px rgba(0, 0, 0, 0.76);
      }

      .fabWrap[data-disabled="true"] .fab {
        cursor: not-allowed;
        opacity: var(--disabled);
        filter: saturate(0.9) brightness(0.95);
        transform: none;
      }

      .fabIcon {
        width: 26px;
        height: 26px;
        transition: transform 240ms cubic-bezier(0.2, 0.9, 0.2, 1);
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.5));
      }

      .fabWrap[data-open="true"] .fabIcon {
        transform: rotate(135deg);
      }

      .fabImproved {
        position: relative;
        isolation: isolate;
        background: radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.16), transparent 54%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0)),
          var(--brand);
      }

      .fabImproved::before {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: 999px;
        background: radial-gradient(circle at 50% 110%, rgba(0, 0, 0, 0.32), transparent 58%);
        opacity: 1;
        pointer-events: none;
        z-index: 0;
      }

      .fabImproved::after {
        content: "";
        position: absolute;
        inset: 2px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        opacity: 0.85;
        pointer-events: none;
        z-index: 1;
      }

      .fabImprovedRing {
        position: absolute;
        inset: -14px;
        border-radius: 999px;
        border: 1px solid rgba(94, 106, 210, 0.0);
        box-shadow: 0 0 0 0 rgba(94, 106, 210, 0.0);
        opacity: 0;
        transform: scale(0.92);
        transition: opacity 220ms ease, transform 260ms cubic-bezier(0.2, 0.9, 0.2, 1), border-color 220ms ease,
          box-shadow 220ms ease;
        pointer-events: none;
      }

      .fabWrap[data-open="true"] .fabImprovedRing {
        opacity: 1;
        transform: scale(1);
        border-color: rgba(94, 106, 210, 0.35);
        box-shadow: 0 0 0 6px rgba(94, 106, 210, 0.1);
      }

      .fabImprovedHover {
        transition: transform 160ms ease, opacity 160ms ease, filter 220ms ease;
      }

      .fabImprovedHover:hover {
        filter: brightness(1.03) saturate(1.02);
        transform: translateY(-1px);
      }

      .fabImprovedHover:active {
        transform: translateY(2px) scale(0.986);
      }

      .foot {
        width: min(760px, 92vw);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted2);
        font-size: 12px;
        padding: 0 6px;
      }

      .kbd {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .kbd kbd {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 11px;
        padding: 5px 8px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="stage">
        <div class="grid">
          <div class="panel">
            <div class="label">
              <strong>Current</strong>
              <span>Solid brand circle + basic shadow + 135° rotate.</span>
            </div>
            <div class="fabWrap" id="fabCurrentWrap" data-open="false" data-disabled="false">
              <div class="fabGlow"></div>
              <button class="fab" id="fabCurrent" type="button" aria-label="Action hub" aria-pressed="false">
                <svg class="fabIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 5v14M5 12h14" stroke="rgba(255,255,255,.92)" stroke-width="2.8" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </div>

          <div class="panel">
            <div class="label">
              <strong>Improved</strong>
              <span>Subtle sheen + inner ring + open-state halo ring (still Linear).</span>
            </div>
            <div class="fabWrap" id="fabImprovedWrap" data-open="false" data-disabled="false">
              <div class="fabGlow"></div>
              <div class="fabImprovedRing" aria-hidden="true"></div>
              <button
                class="fab fabImproved fabImprovedHover"
                id="fabImproved"
                type="button"
                aria-label="Action hub"
                aria-pressed="false"
              >
                <svg class="fabIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 5v14M5 12h14" stroke="rgba(255,255,255,.92)" stroke-width="2.8" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="foot">
        <span class="kbd"><kbd>1</kbd> toggle current · <kbd>2</kbd> toggle improved · <kbd>Esc</kbd> close · <kbd>D</kbd> disable</span>
        <span id="state" style="color: var(--muted)">State: closed</span>
      </div>
    </div>

    <script>
      const state = document.getElementById("state");
      const currentWrap = document.getElementById("fabCurrentWrap");
      const improvedWrap = document.getElementById("fabImprovedWrap");
      const currentBtn = document.getElementById("fabCurrent");
      const improvedBtn = document.getElementById("fabImproved");

      function setOpen(wrap, btn, next) {
        if (wrap.dataset.disabled === "true") return;
        wrap.dataset.open = next ? "true" : "false";
        btn.setAttribute("aria-pressed", next ? "true" : "false");
      }

      function closeAll() {
        setOpen(currentWrap, currentBtn, false);
        setOpen(improvedWrap, improvedBtn, false);
      }

      function setDisabled(next) {
        currentWrap.dataset.disabled = next ? "true" : "false";
        improvedWrap.dataset.disabled = next ? "true" : "false";
        currentBtn.disabled = next;
        improvedBtn.disabled = next;
        if (next) closeAll();
      }

      function syncStateLabel() {
        const c = currentWrap.dataset.open === "true" ? "open" : "closed";
        const i = improvedWrap.dataset.open === "true" ? "open" : "closed";
        const d = currentWrap.dataset.disabled === "true";
        state.textContent = `State: current ${c} · improved ${i}${d ? " (disabled)" : ""}`;
      }

      currentBtn.addEventListener("click", () => {
        setOpen(currentWrap, currentBtn, currentWrap.dataset.open !== "true");
        syncStateLabel();
      });

      improvedBtn.addEventListener("click", () => {
        setOpen(improvedWrap, improvedBtn, improvedWrap.dataset.open !== "true");
        syncStateLabel();
      });

      document.addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();
        if (k === "escape") {
          closeAll();
          syncStateLabel();
          return;
        }
        if (k === "d") {
          setDisabled(currentWrap.dataset.disabled !== "true");
          syncStateLabel();
          return;
        }
        if (k === "1") {
          setOpen(currentWrap, currentBtn, currentWrap.dataset.open !== "true");
          syncStateLabel();
          return;
        }
        if (k === "2") {
          setOpen(improvedWrap, improvedBtn, improvedWrap.dataset.open !== "true");
          syncStateLabel();
        }
      });

      syncStateLabel();
    </script>
  </body>
</html>
