<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guru Dev Launcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1115;
      --surface: #1a1d24;
      --surface-hover: #232730;
      --border: #2a2e37;
      --text: #e4e6eb;
      --text-muted: #8b909a;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
      --info: #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-dot.connected { background: var(--success); }
    .status-dot.running { background: var(--warning); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .container {
      flex: 1;
      padding: 24px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .action-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }

    .action-btn:hover:not(:disabled) {
      background: var(--surface-hover);
      border-color: var(--accent);
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      grid-column: 1 / -1;
      padding: 24px;
    }

    .action-btn.primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .action-btn .icon {
      font-size: 28px;
    }

    .action-btn .label {
      font-size: 14px;
      font-weight: 500;
    }

    .action-btn .desc {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    .logs-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .logs-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logs-header span {
      font-size: 13px;
      font-weight: 500;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .clear-btn:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .logs {
      height: 400px;
      overflow-y: auto;
      padding: 12px 16px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .log-entry {
      display: flex;
      gap: 12px;
      padding: 2px 0;
    }

    .log-time {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .log-info { color: var(--text); }
    .log-stdout { color: var(--info); }
    .log-stderr { color: var(--warning); }
    .log-error { color: var(--error); }
    .log-success { color: var(--success); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success { background: var(--success); color: #000; }
    .toast.error { background: var(--error); color: #fff; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <h1>Guru Dev Launcher</h1>
  </div>

  <div class="container">
    <div class="actions">
      <button class="action-btn primary" id="btnDev" onclick="runAction('dev')">
        <span class="icon">🚀</span>
        <span class="label">Run on Tablet</span>
        <span class="desc">Full rebuild + Metro + open app</span>
      </button>
      <button class="action-btn" id="btnHotReload" onclick="runAction('hot-reload')">
        <span class="icon">⚡</span>
        <span class="label">Hot Reload</span>
        <span class="desc">Open app (Metro running)</span>
      </button>
      <button class="action-btn" id="btnStartMetro" onclick="runAction('start-metro')">
        <span class="icon">📡</span>
        <span class="label">Start Metro</span>
        <span class="desc">Bundler only</span>
      </button>
      <button class="action-btn" id="btnRebuild" onclick="runAction('rebuild')">
        <span class="icon">🔨</span>
        <span class="label">Rebuild APK</span>
        <span class="desc">Debug APK only</span>
      </button>
      <button class="action-btn" id="btnStopMetro" onclick="runAction('stop-metro')">
        <span class="icon">⏹️</span>
        <span class="label">Stop Metro</span>
        <span class="desc">Kill all Metro processes</span>
      </button>
    </div>

    <div class="logs-container">
      <div class="logs-header">
        <span>Output</span>
        <button class="clear-btn" onclick="clearLogs()">Clear</button>
      </div>
      <div class="logs" id="logs">
        <div class="empty-state">
          <div class="icon">📱</div>
          <div>Click "Run on Tablet" to get started</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let eventSource = null;
    let isRunning = false;

    function connect() {
      const dot = document.getElementById('statusDot');
      eventSource = new EventSource('/events');

      eventSource.onopen = () => {
        dot.classList.add('connected');
      };

      eventSource.onmessage = (e) => {
        const data = JSON.parse(e.data);

        if (data.type === 'log') {
          addLog(data);
        } else if (data.type === 'done') {
          setRunning(false);
          showToast(data.success ? 'success' : 'error', data.success ? 'Completed!' : 'Failed');
        } else if (data.type === 'status') {
          data.logs.forEach(log => addLog(log));
          if (data.running) setRunning(true);
        }
      };

      eventSource.onerror = () => {
        dot.classList.remove('connected');
        setTimeout(connect, 3000);
      };
    }

    function addLog(entry) {
      const logsEl = document.getElementById('logs');
      const emptyState = logsEl.querySelector('.empty-state');
      if (emptyState) emptyState.remove();

      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `
        <span class="log-time">${entry.time}</span>
        <span class="log-${entry.level}">${escapeHtml(entry.message)}</span>
      `;
      logsEl.appendChild(div);
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function clearLogs() {
      document.getElementById('logs').innerHTML = `
        <div class="empty-state">
          <div class="icon">📱</div>
          <div>Click "Run on Tablet" to get started</div>
        </div>
      `;
    }

    function setRunning(running) {
      isRunning = running;
      const dot = document.getElementById('statusDot');
      const buttons = document.querySelectorAll('.action-btn');

      buttons.forEach(btn => btn.disabled = running);

      if (running) {
        dot.classList.remove('connected');
        dot.classList.add('running');
      } else {
        dot.classList.remove('running');
        dot.classList.add('connected');
      }
    }

    async function runAction(action) {
      setRunning(true);
      clearLogs();

      try {
        await fetch('/api/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action }),
        });
      } catch (err) {
        showToast('error', 'Failed to start action');
        setRunning(false);
      }
    }

    function showToast(type, message) {
      const toast = document.getElementById('toast');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    connect();
  </script>
</body>
</html>
